<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Sampler</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>

  <script>
    const samples = [
      { name: "Ah-Ha", file: "ah-ha.mp3", dur: 1.4 },
      { name: "Dan", file: "dan.mp3", dur: 0.5 },
      { name: "Back of the net", file: "back-of-the-net.mp3", dur: 1.0 },
      { name: "Bang out of order", file: "bangoutoforder.mp3", dur: 1.4 },
      { name: "Jurassic Park", file: "jurassic-park.mp3", dur: 1.5 },
      { name: "Smell my cheese", file: "smell-my-cheese.mp3", dur: 1.9 },
      { name: "Goal", file: "goal.mp3", dur: 1.5 },
      { name: "Kiss my face", file: "kiss-my-face2.mp3", dur: 1.1 },
      { name: "Hello Partridge", file: "hellopartridge.mp3", dur: 2.3 }
    ];

    let page = 0, activeAudio = null;

    const stopAudio = () => activeAudio && (activeAudio.pause(), activeAudio = null);
    const play = (sample, statusId) => {
      stopAudio();
      const status = document.getElementById(statusId);
      const audio = new Audio(sample.file);
      activeAudio = audio;
      status.textContent = ` Playing: "${sample.name}" ...`;
      audio.play().catch(() => status.textContent = ` Cannot play "${sample.name}"`);
      audio.onended = () => {
        activeAudio = null;
        status.textContent = ` Finished: "${sample.name}"`;
        setTimeout(() => status.textContent = `Click any sample to play`, 1500);
      };
    };

    const renderBoard = (containerId, statusId) => {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      samples.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'audio-btn';
        btn.innerHTML = `<div class="name">${s.name}</div><span class="dur">${s.dur.toFixed(1)}s</span>`;
        btn.onclick = () => play(s, statusId);
        container.appendChild(btn);
      });
    };

    const initTTS = () => {
      const btn = document.getElementById('speechBtn');
      const textarea = document.getElementById('ttsMsg');
      const feedback = document.getElementById('ttsFeed');
      btn.onclick = () => {
        const text = textarea.value.trim();
        if (!text) return feedback.textContent = 'Type something first!';
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-GB';
        feedback.textContent = ` Speaking...`;
        utterance.onend = () => feedback.textContent = `Done! Type another message.`;
        utterance.onerror = () => feedback.textContent = `Error - try again`;
        speechSynthesis.speak(utterance);
      };
    };

    const pages = [
      `<div class="container"><h1>AUDIO SAMPLER</h1><div id="board" class="grid"></div><div class="pagination"><button id="prevBtn">◀</button><span id="indicator">Page 1/2</span><button id="nextBtn">▶</button></div><div class="status" id="status">Click any sample</div></div>`,
      `<div class="container2"><div class="tts-col"><h2>TEXT TO SPEECH</h2><div class="card"><textarea id="ttsMsg" rows="4" placeholder="Type your message..."></textarea><button id="speechBtn" class="speak">PLAY SPEECH</button><div id="ttsFeed" class="tts-status">Ready</div></div></div><div class="audio-col"><h2>AUDIO SAMPLER</h2><div id="board" class="grid"></div><div class="pagination"><button id="prevBtn">◀</button><span id="indicator">Page 2/2</span><button id="nextBtn">▶</button></div><div class="status" id="status">Click any sample</div></div></div>`
    ];

    const render = () => {
      const isPage2 = page === 1;
      document.getElementById('app').innerHTML = pages[page];
      
      if (isPage2) {
        renderBoard('board', 'status');
        initTTS();
      } else {
        renderBoard('board', 'status');
      }
      
      const prev = document.getElementById('prevBtn');
      const next = document.getElementById('nextBtn');
      const indicator = document.getElementById('indicator');
      
      indicator.textContent = `Page ${page + 1}/2`;
      prev.disabled = page === 0;
      next.disabled = page === 1;
      
      prev.onclick = () => { if (page > 0) { page--; stopAudio(); render(); } };
      next.onclick = () => { if (page < 1) { page++; stopAudio(); render(); } };
    };
    
    render();
  </script>
</body>
</html>
